spring.application.name=authentificate
server.port=8080

user.api.base-url=http://localhost:8081/api
user.api.users-by-pseudo-path=/users/pseudo/{pseudo}

auth.token.secret=change-this-secret-key-with-at-least-32-characters
auth.token.expiration-seconds=10800

spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
