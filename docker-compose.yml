services:
  authentificate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authentificate
    ports:
      - "11062:8080"
    environment:
      USER_API_BASE_URL: http://user-api:8080/api
      USER_API_LOGIN_CHECK_PATH: /users/login
      AUTH_TOKEN_SECRET: change-this-secret-key-with-at-least-32-characters
      AUTH_TOKEN_EXPIRATION_SECONDS: 10800
      SPRING_DATASOURCE_URL: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
    restart: unless-stopped
